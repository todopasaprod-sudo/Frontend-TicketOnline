<article class="event-card">

  <!-- Gradient image area -->
  <div class="event-card__image" [style.background]="gradient()">
    <div class="event-card__image-overlay"></div>

    <span class="event-card__category">{{ event().category }}</span>

    @if (isNew()) {
      <span class="event-card__badge event-card__badge--new">Nuevo</span>
    }
    @if (isSoldOut()) {
      <span class="event-card__badge event-card__badge--sold">Agotado</span>
    }

    <div class="event-card__date-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      {{ formattedDate() }}
    </div>
  </div>

  <!-- Info -->
  <div class="event-card__info">
    <h3 class="event-card__title">{{ event().name }}</h3>

    <div class="event-card__meta">
      <div class="event-card__location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span>{{ event().venue }}, {{ event().city }}</span>
      </div>
      <div class="event-card__time">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>{{ formattedTime() }}</span>
      </div>
    </div>

    <div class="event-card__footer">
      @if (event().price == null) {
        <span class="event-card__price event-card__price--free">Gratis</span>
      } @else {
        <span class="event-card__price">Desde ${{ formatPrice(event().price!) }}</span>
      }
      <button class="event-card__cta" [disabled]="isSoldOut()">
        {{ isSoldOut() ? 'Agotado' : 'Ver entradas' }}
      </button>
    </div>
  </div>

</article>
