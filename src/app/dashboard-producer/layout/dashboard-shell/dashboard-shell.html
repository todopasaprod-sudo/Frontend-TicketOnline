<div class="shell" [class.shell--collapsed]="!sidebarOpen()">

  <!-- Sidebar -->
  <aside class="shell__sidebar">
    <div class="sidebar">

      <!-- Logo -->
      <a routerLink="/eventos" class="sidebar__logo">
        <svg viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="white" fill-opacity="0.12"/>
          <path d="M14 18h20M14 24h20M14 30h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="36" cy="30" r="5" fill="#a855f7"/>
          <path d="M34 30l1.5 1.5L38 28" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="sidebar__logo-text">
          <span class="sidebar__logo-name">TicketOnline</span>
          <span class="sidebar__logo-role">Panel Productor</span>
        </div>
      </a>

      <!-- Nav -->
      <nav class="sidebar__nav">
        <p class="sidebar__section-label">Principal</p>

        <a routerLink="overview" routerLinkActive="active"
           [routerLinkActiveOptions]="{exact:true}" class="sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Overview</span>
        </a>

        <a routerLink="eventos" routerLinkActive="active"
           [routerLinkActiveOptions]="{exact:true}" class="sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>Mis Eventos</span>
        </a>

        <div class="sidebar__group">
          <div class="sidebar__group-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            <span>Estadísticas</span>
          </div>
          <div class="sidebar__subnav">
            <a routerLink="estadisticas/resumen" routerLinkActive="active"
               [routerLinkActiveOptions]="{exact:true}" class="sidebar__sublink">Resumen</a>
            <a routerLink="estadisticas/ventas" routerLinkActive="active"
               [routerLinkActiveOptions]="{exact:true}" class="sidebar__sublink">Velocidad de ventas</a>
            <a routerLink="estadisticas/embudo" routerLinkActive="active"
               [routerLinkActiveOptions]="{exact:true}" class="sidebar__sublink">Embudo</a>
            <a routerLink="estadisticas/comparacion" routerLinkActive="active"
               [routerLinkActiveOptions]="{exact:true}" class="sidebar__sublink">Comparación</a>
            <a routerLink="estadisticas/forecast" routerLinkActive="active"
               [routerLinkActiveOptions]="{exact:true}" class="sidebar__sublink">Proyección</a>
            <a routerLink="estadisticas/geografia" routerLinkActive="active"
               [routerLinkActiveOptions]="{exact:true}" class="sidebar__sublink">Geografía</a>
          </div>
        </div>

        <p class="sidebar__section-label">Acciones</p>

        <a routerLink="eventos/nuevo" routerLinkActive="active"
           [routerLinkActiveOptions]="{exact:true}" class="sidebar__link sidebar__link--create">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <span>Crear Evento</span>
        </a>
      </nav>

      <!-- User info -->
      <div class="sidebar__user">
        <div class="sidebar__avatar">JP</div>
        <div class="sidebar__user-info">
          <span class="sidebar__user-name">Juan Productor</span>
          <span class="sidebar__user-role">Productor verificado</span>
        </div>
        <a routerLink="/login" class="sidebar__logout" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </a>
      </div>

    </div>
  </aside>

  <!-- Mobile backdrop -->
  @if (sidebarOpen()) {
    <div class="shell__backdrop" (click)="closeSidebar()"></div>
  }

  <!-- Main area -->
  <div class="shell__main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="topbar__toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>
      <h1 class="topbar__title">{{ pageTitle() }}</h1>
      <div class="topbar__actions">
        <button class="topbar__icon-btn" aria-label="Notificaciones">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <span class="topbar__badge">3</span>
        </button>
        <a routerLink="/eventos" class="topbar__view-site">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/>
          </svg>
          Ver sitio
        </a>
      </div>
    </header>

    <!-- Page content -->
    <main class="shell__content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
